[package]
name = "plainview"
version = "0.2.0"
description = "A minimal ad-free image viewer for Windows"
authors = ["teemoZipsa"]
edition = "2021"

[lib]
name = "plainview_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
